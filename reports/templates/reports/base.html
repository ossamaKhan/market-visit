<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Management{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
{% if user.is_authenticated %}
<nav class="navbar navbar-expand-lg management-navbar sticky-top">
    <div class="container-fluid px-3 px-lg-4">
        <a class="navbar-brand" href="{% url 'management_dashboard' %}">
            <svg class="brand-mark" viewBox="0 0 28 20" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <rect x="0" y="12" width="5" height="8" rx="1.5"/>
                <rect x="8" y="7" width="5" height="13" rx="1.5"/>
                <rect x="16" y="0" width="5" height="20" rx="1.5"/>
            </svg>
            Management
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mgmtNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mgmtNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" href="{% url 'management_dashboard' %}">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'viewer_dashboard' %}">Visits</a></li>
            </ul>
            <div class="d-flex align-items-center gap-3">
                <span class="navbar-user-email">{{ user.email|default:user.username }}</span>
                <form method="post" action="{% url 'management_logout' %}" class="mb-0">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-sm btn-outline-light">Log out</button>
                </form>
            </div>
        </div>
    </div>
</nav>
{% endif %}

<main class="container py-4">
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
        {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
