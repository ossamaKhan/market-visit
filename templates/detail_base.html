<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Visit Detail{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
{% if user.is_authenticated %}
<nav class="navbar navbar-expand-lg app-navbar">
    <div class="container-fluid px-3 px-lg-4">
        <a class="navbar-brand" href="{% if is_management %}{% url 'viewer_dashboard' %}{% else %}{% url 'dashboard' %}{% endif %}">
            <svg class="brand-mark" viewBox="0 0 28 20" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <rect x="0" y="12" width="5" height="8" rx="1.5"/>
                <rect x="8" y="7" width="5" height="13" rx="1.5"/>
                <rect x="16" y="0" width="5" height="20" rx="1.5"/>
            </svg>
            {% if is_management %}&larr; Back to Visits{% else %}&larr; Back to Dashboard{% endif %}
        </a>
    </div>
</nav>
{% endif %}
<main class="container py-4">
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
        {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
